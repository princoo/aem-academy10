<nav
  data-sly-use.breadcrumb="com.adobe.cq.wcm.core.components.models.Breadcrumb"
  data-sly-use.template="core/wcm/components/commons/v1/templates.html"
  id="${breadcrumb.id}"
  class="custom-breadcrumb"
  aria-label="${'Breadcrumb' @ i18n}"
  data-sly-test="${breadcrumb.items.size > 0}"
  data-cmp-data-layer="${breadcrumb.data.json}"
  role="navigation"
>
  <ol
    class="custom-breadcrumb__list"
    itemscope
    itemtype="http://schema.org/BreadcrumbList"
    data-sly-list.navItem="${breadcrumb.items}"
  >
    <sly data-sly-set.lang="${navItem.page.properties.contentLang}" />

    <li
      class="custom-breadcrumb__item ${navItem.active ? 'is-active' : ''}"
      aria-current="${navItem.active ? 'page' : false}"
      data-cmp-data-layer="${navItem.data.json}"
      itemprop="itemListElement"
      itemscope
      itemtype="http://schema.org/ListItem"
    >
      <a
        data-sly-attribute="${navItem.link.htmlAttributes}"
        class="custom-breadcrumb__link"
        itemprop="item"
        lang="${lang}"
        hreflang="${lang}"
        data-cmp-clickable="${breadcrumb.data ? true : false}"
        data-sly-unwrap="${navItem.active || !navItem.link.valid}"
      >
        <span itemprop="name">${navItem.title}</span>
      </a>
      <meta itemprop="position" content="${navItemList.count}" />

      <sly data-sly-test="${!navItemList.last}">
        <i class="icon-academy-right custom-breadcrumb__separator"></i>

        <!--/* <span class="custom-breadcrumb__separator"> > </span> */-->
      </sly>
    </li>
  </ol>
</nav>

<sly
  data-sly-call="${template.placeholder @ isEmpty=breadcrumb.items.size == 0, classAppend='cmp-breadcrumb'}"
></sly>
